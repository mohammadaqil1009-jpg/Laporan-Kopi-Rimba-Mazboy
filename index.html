<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Kopi Rimba</title>
    <style>
        :root {
            --red-primary: #d32f2f;
            --black-dark: #1a1a1a;
            --black-light: #333333;
            --white: #ffffff;
            --gray-bg: #f5f5f5;
            --border: #e0e0e0;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--gray-bg); margin: 0; padding-bottom: 80px; color: var(--black-dark); }
        
        /* Header */
        .header { background: var(--black-dark); color: var(--white); text-align: center; padding: 25px 15px; border-bottom: 4px solid var(--red-primary); }
        
        /* Navigation */
        .tab-nav { display: flex; background: var(--white); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; color: var(--black-light); cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: var(--red-primary); border-bottom: 4px solid var(--red-primary); }

        .container { padding: 45px 15px 15px; max-width: 600px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Profile Card */
        .profile-card {
            background: linear-gradient(135deg, var(--black-dark) 0%, var(--black-light) 100%);
            border-radius: 20px; padding: 20px; color: white;
            margin: 0 15px -30px 15px; position: relative; z-index: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 5px solid var(--red-primary);
        }
        .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .avatar-circle { width: 65px; height: 65px; background: white; border-radius: 50%; overflow: hidden; border: 2px solid var(--red-primary); }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .profile-meta { display: flex; background: rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 10px; justify-content: space-between; font-size: 0.75rem; }

        /* Card Style */
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-title { font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: var(--red-primary); font-weight: 800; border-bottom: 2px solid var(--gray-bg); margin-bottom: 15px; padding-bottom: 8px; }

        /* Menu Grid */
        #menu-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .menu-item { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: relative; transition: 0.2s; }
        .menu-item:active { background: #fff5f5; }
        .menu-controls { display: flex; align-items: center; gap: 12px; border-left: 2px solid var(--gray-bg); padding-left: 15px; }
        .btn-mini { background: var(--black-dark); color: white; border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 1.1rem; }
        .btn-mini:active { background: var(--red-primary); }
        .qty-badge { background: var(--red-primary); color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; position: absolute; top: -8px; left: -8px; font-weight: bold; }

        /* Inputs & Buttons */
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group label { font-size: 0.75rem; margin-bottom: 5px; font-weight: bold; color: var(--black-light); }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 0.95rem; outline: none; }
        input:focus { border-color: var(--red-primary); }

        .btn-checkin, .btn-gen { background: var(--red-primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; transition: 0.3s; }
        .btn-gen { background: var(--black-dark); border: 2px solid var(--red-primary); }
        .btn-gen:active { background: var(--red-primary); }

        .total-bold { font-size: 1.3rem; font-weight: bold; color: var(--red-primary); text-align: center; background: #fff5f5; width: 100%; border: 2px solid var(--red-primary); border-radius: 10px; padding: 12px; box-sizing: border-box; }
        .cart-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--border); font-size: 0.9rem; }

        /* Kalkulator */
        .float-calc { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .btn-float-toggle { width: 60px; height: 60px; background: var(--black-dark); color: var(--white); border-radius: 50%; border: 3px solid var(--red-primary); font-size: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; }
        .calc-hp { position: absolute; bottom: 75px; right: 0; width: 280px; background: #000; border-radius: 25px; padding: 15px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .calc-screen { text-align: right; padding: 20px 10px; color: white; height: 80px; display: flex; flex-direction: column; justify-content: flex-end; }
        #calc-display { font-size: 2.5rem; font-weight: 300; }
        .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 10px; }
        .calc-buttons button { height: 55px; border-radius: 50%; border: none; background: #333; color: white; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 0.7rem; letter-spacing: 4px; font-weight: bold;">KOPI RIMBA MAZBOY GROUP</div>
    <h1 style="margin: 5px 0; font-size: 1.6rem; color: var(--red-primary);">Sistem Laporan Harian</h1>
</div>

<div class="tab-nav">
    <button class="tab-btn active" onclick="openTab(event, 'tab-absen')">📍 CHECK-IN</button>
    <button class="tab-btn" onclick="openTab(event, 'tab-penjualan')">☕ PENJUALAN</button>
</div>

<div class="container">
    <div id="tab-absen" class="tab-content active">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-circle"><img src="https://via.placeholder.com/80" id="display-avatar"></div>
                <div class="profile-info">
                    <p style="margin:0; font-size: 0.8rem; opacity: 0.8;">Selamat Bekerja,</p>
                    <h2 id="display-name" style="margin:0; text-transform: uppercase;">Nama Staff</h2>
                    <p id="display-role" style="margin:0; font-size: 0.8rem; color: var(--red-primary);">Outlet Belum Dipilih</p>
                </div>
            </div>
            <div class="profile-meta">
                <div class="meta-item">🕒 <strong id="live-clock">00:00:00 WIB</strong></div>
                <div class="meta-item">📍 <strong>Kopi Rimba Mazboy</strong></div>
            </div>
        </div>

        <div class="card" style="padding-top: 50px;">
            <form id="absenForm">
                <div class="input-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="p_nama" placeholder="Input nama..." oninput="updateProfileDisplay()" required>
                </div>
                <div class="input-group">
                    <label>Shift / Outlet</label>
                    <select id="p_outlet" onchange="updateProfileDisplay()" required>
                        <option value="">-- Pilih Shift --</option>
                        <option value="Kasir - Pagi">Kasir - Pagi</option>
                        <option value="Kasir - Malam">Kasir - Malam</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Modal Awal (Cash)</label>
                    <input type="text" id="p_rupiah" placeholder="Rp 0" onkeyup="formatRupiahInput(this)" required>
                </div>
                <input type="hidden" id="p_time">
                <input type="hidden" id="p_tgl">
                <button type="submit" class="btn-checkin">KONFIRMASI MULAI KERJA</button>
            </form>
        </div>
    </div>

    <div id="tab-penjualan" class="tab-content">
        <div class="card">
            <div class="card-title">📋 Pilih Menu</div>
            <div id="menu-grid"></div>
        </div>

        <div class="card">
            <div class="card-title">🧾 Ringkasan Pesanan</div>
            <div id="cart-list"></div>
        </div>

        <div class="card">
            <div class="card-title">💰 Perhitungan Setoran</div>
            
            <div class="input-group">
                <label>Metode Pembayaran Utama</label>
                <select id="pay-method">
                    <option>Tunai</option>
                    <option>QRIS</option>
                    <option>ONLINE</option>
                </select>
            </div>

            <div class="input-group">
                <label>Total Pengeluaran (Bensin, Es, dll)</label>
                <input type="text" id="p_keluar_kopi" placeholder="Rp 0" onkeyup="formatRupiahInput(this); calculateTotal()">
            </div>

            <div class="input-group">
                <label>Total Masuk via QRIS</label>
                <input type="text" id="p_qris_kopi" placeholder="Rp 0" onkeyup="formatRupiahInput(this); calculateTotal()" style="border-color: #1976d2;">
            </div>

            <div class="input-group">
                <label>Total Volume Penjualan</label>
                <input type="text" id="total-cup-kopi" readonly class="total-bold" value="0 Cup" style="background: #eee; color: #333; border-color: #333;">
            </div>

            <div class="input-group">
                <label>Setoran TUNAI Bersih</label>
                <input type="text" id="total-display-kopi" readonly class="total-bold" value="Rp 0">
            </div>
        </div>

        <button class="btn-gen" onclick="checkout()">⚡ KIRIM LAPORAN KE WHATSAPP</button>
    </div>
</div>

<div class="float-calc">
    <div class="calc-hp" id="calc-box">
        <div class="calc-screen"><div id="calc-display">0</div></div>
        <div class="calc-buttons">
            <button onclick="calcClear()" style="color: #ff3b30;">AC</button>
            <button onclick="calcDel()">⌫</button>
            <button onclick="calcInput('/')">÷</button>
            <button onclick="calcInput('*')">×</button>
            <button onclick="calcInput('7')">7</button>
            <button onclick="calcInput('8')">8</button>
            <button onclick="calcInput('9')">9</button>
            <button onclick="calcInput('-')">−</button>
            <button onclick="calcInput('1')">1</button>
            <button onclick="calcInput('2')">2</button>
            <button onclick="calcInput('3')">3</button>
            <button onclick="calcInput('+')">+</button>
            <button onclick="calcInput('0')" style="grid-column: span 2; width: 100%; border-radius: 30px;">0</button>
            <button onclick="calcInput('.')">.</button>
            <button onclick="calcEqual()" style="background:#d32f2f">=</button>
        </div>
    </div>
    <button class="btn-float-toggle" onclick="toggleCalc()">🧮</button>
</div>

<script src="script.js"></script>
</body>
</html>
